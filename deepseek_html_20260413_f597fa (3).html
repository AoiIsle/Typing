<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语打字道场 - N2完全版</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Sans JP', 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 25px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
            width: 950px;
            max-width: 100%;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin: 0 0 5px;
            font-size: 1.8rem;
        }

        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }

        /* 控制栏 */
        .control-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        /* 词库选择下拉菜单 */
        .level-dropdown {
            position: relative;
            display: inline-block;
        }

        .level-main-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .level-main-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        .level-dropdown-content {
            display: none;
            position: absolute;
            background: #1e293b;
            min-width: 100px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 1;
            margin-top: 5px;
            overflow: hidden;
        }

        .level-dropdown-content button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            padding: 10px 20px;
            text-align: left;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-dropdown-content button:hover {
            background: #334155;
        }

        .level-dropdown-content button.active-level {
            background: #facc15;
            color: #0f172a;
        }

        .level-dropdown:hover .level-dropdown-content {
            display: block;
        }

        .game-config {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .game-config label {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        #questionCount {
            background: #1e293b;
            border: 1px solid #475569;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            width: 60px;
            text-align: center;
        }

        /* 游戏控制按钮组 */
        .game-control-buttons {
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .control-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        .reset-btn {
            background: #475569;
            color: white;
        }

        .reset-btn:hover {
            background: #334155;
        }

        /* 模式指示器 */
        .mode-indicator {
            background: #0f172a;
            border-radius: 30px;
            padding: 6px 15px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        .mode-normal { color: #4ade80; }
        .mode-review { color: #facc15; }
        .mode-wrongbank { color: #f97316; }

        /* 日语卡片 */
        .japanese-card {
            background: #0f172a;
            border-radius: 32px;
            padding: 35px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid #334155;
        }

        .jp-word {
            font-size: 4rem;
            font-weight: 700;
            color: #facc15;
            text-shadow: 0 4px 10px rgba(250,204,21,0.3);
            letter-spacing: 4px;
        }

        .hint-area {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hint-item {
            background: #1e293b;
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .hint-content {
            font-size: 1rem;
            font-weight: bold;
            color: #facc15;
            min-width: 100px;
            transition: all 0.2s;
        }

        .hint-content.blurred {
            filter: blur(5px);
            opacity: 0.5;
        }

        .teddy-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 2rem;
            padding: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .teddy-btn:hover {
            transform: scale(1.1);
        }

        .teddy-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* 输入区域 */
        .input-area {
            background: #1e293b;
            border-radius: 60px;
            padding: 5px 20px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #475569;
            gap: 15px;
        }

        .input-area:focus-within {
            border-color: #facc15;
            box-shadow: 0 0 0 3px rgba(250,204,21,0.3);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 0;
            font-size: 1.6rem;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #f1f5f9;
            outline: none;
        }

        .submit-btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #eab308;
            transform: scale(0.97);
        }

        /* 反馈区域 */
        .progress-feedback {
            background: #0f172a;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .match-status {
            color: #cbd5e1;
        }

        .error-detail {
            color: #f87171;
            font-size: 0.85rem;
        }

        .prefix-hint {
            color: #94a3b8;
            font-size: 0.8rem;
            font-family: monospace;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        .prefix-hint.correct { color: #4ade80; }
        .prefix-hint.wrong { color: #f87171; }

        /* 统计 - 亮色设计 */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #0f172a;
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 28px;
            min-width: 80px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-value.correct { color: #4ade80; }
        .stat-value.wrong { color: #f87171; }
        .stat-value.progress { color: #facc15; }
        .stat-value.round { color: #f97316; }
        .stat-value.score { color: #38bdf8; }

        /* 词库进度条 */
        .library-progress {
            background: #0f172a;
            border-radius: 30px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .progress-text {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #facc15;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: #334155;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        button:hover {
            background: #475569;
            transform: scale(0.97);
        }

        /* 词本面板 */
        .word-banks {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .bank-panel {
            flex: 1;
            background: #0f172a;
            border-radius: 20px;
            padding: 12px;
            max-height: 250px;
            overflow-y: auto;
        }

        .bank-title {
            font-weight: bold;
            color: #facc15;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bank-list {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        .bank-item {
            padding: 4px 6px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .bank-item:hover {
            background: #1e293b;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #f87171;
            cursor: pointer;
            margin-left: 8px;
            font-size: 0.7rem;
            padding: 0 4px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🐕‍🦺 日语打字道场 · N2完全版</h1>
    <div class="sub">基于《N2汉字/词汇 考前对策》| 三轮复习机制</div>

    <div class="control-bar">
        <div class="level-dropdown">
            <button class="level-main-btn" id="levelMainBtn">📖 N2词库 ▼</button>
            <div class="level-dropdown-content" id="levelDropdown">
                <button data-level="N5">N5 (待添加)</button>
                <button data-level="N4">N4 (待添加)</button>
                <button data-level="N3">N3 (待添加)</button>
                <button data-level="N2" class="active-level">N2 (已加载)</button>
                <button data-level="N1">N1 (待添加)</button>
            </div>
        </div>
        <div class="game-config">
            <label>📝 本轮题数:</label>
            <input type="number" id="questionCount" value="10" min="1" max="50">
        </div>
        <div class="game-control-buttons">
            <button class="control-btn" id="startPauseBtn">▶ 开始游戏</button>
            <button class="control-btn reset-btn" id="resetGameBtn">🔄 重置</button>
        </div>
    </div>

    <!-- 模式指示器 -->
    <div class="mode-indicator" id="modeIndicator">
        <span>⚡ 模式: </span><span id="modeText" class="mode-normal">未开始</span>
        <span id="roundInfo" style="margin-left: 15px;"></span>
    </div>

    <!-- 日语卡片 -->
    <div class="japanese-card">
        <div class="jp-word" id="jpWord">日本語</div>
        <div class="hint-area">
            <div class="hint-item">
                <button class="teddy-btn" id="romajiTeddyBtn" title="咖啡泰迪 - 罗马音提示">
                    <span class="teddy-icon">🐕‍🦺</span>
                    <span style="font-size:0.8rem;">罗马音</span>
                </button>
                <div class="hint-content blurred" id="romajiHint">nihongo</div>
            </div>
            <div class="hint-item">
                <button class="teddy-btn" id="kanaTeddyBtn" title="灰白泰迪 - 假名读音">
                    <span class="teddy-icon">🐩</span>
                    <span style="font-size:0.8rem;">假名读</span>
                </button>
                <div class="hint-content blurred" id="kanaHint">にほんご</div>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <span style="color:#94a3b8">⌨️ 输入罗马音:</span>
        <input type="text" id="userInput" placeholder="例: nihongo" autocomplete="off" autofocus>
        <button class="submit-btn" id="submitBtn">↵ 提交</button>
    </div>

    <!-- 反馈区域 -->
    <div class="progress-feedback">
        <div class="match-status" id="matchStatus">✨ 点击开始游戏</div>
        <div class="error-detail" id="errorDetail"></div>
    </div>
    <div class="prefix-hint" id="prefixHint">💡 输入罗马音后，这里会显示前缀匹配情况</div>

    <!-- 统计 -->
    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">✅ 本轮正确</div>
            <div class="stat-value correct" id="correctCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">❌ 本轮错误</div>
            <div class="stat-value wrong" id="wrongCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">📊 进度</div>
            <div class="stat-value progress" id="progressCount">0/<span id="totalQ">0</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">🔄 复习轮次</div>
            <div class="stat-value round" id="roundNum">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">⭐ 得分</div>
            <div class="stat-value score" id="scoreValue">0</div>
        </div>
    </div>

    <!-- 词库进度 -->
    <div class="library-progress" id="libraryProgress">
        <span class="progress-text" id="testedCount">📖 已测试: 0词</span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        <span class="progress-text" id="remainingCount">📚 剩余: 0词</span>
    </div>

    <!-- 按钮组 -->
    <div class="button-group">
        <button id="addToFavoriteBtn">⭐ 收藏当前词</button>
        <button id="clearFavoritesBtn">🗑️ 清空收藏</button>
        <button id="reviewWrongBankBtn" style="background:#f97316">📕 复习错题本</button>
    </div>

    <!-- 错题本 & 收藏本 -->
    <div class="word-banks">
        <div class="bank-panel">
            <div class="bank-title">📕 错题本 (三轮后仍未掌握的)</div>
            <div class="bank-list" id="wrongList"></div>
        </div>
        <div class="bank-panel">
            <div class="bank-title">⭐ 收藏本</div>
            <div class="bank-list" id="favoriteList"></div>
        </div>
    </div>
    <footer>🐕 咖啡泰迪=罗马音 | 🐩 灰白泰迪=假名读音 | 完成整轮后才复习错词 | 连续三轮错误的词进入错题本</footer>
</div>

        {jp:"投書", romaji:"tousho", kana:"とうしょ"},{jp:"武力", romaji:"buryoku", kana:"ぶりょく"},
        {jp:"捜査", romaji:"sousa", kana:"そうさ"},{jp:"骨折", romaji:"kossetsu", kana:"こっせつ"},
        {jp:"親善", romaji:"shinzen", kana:"しんぜん"},{jp:"改善", romaji:"kaizen", kana:"かいぜん"},
        {jp:"尊重", romaji:"sonchou", kana:"そんちょう"},{jp:"頭脳", romaji:"zunou", kana:"ずのう"},
        {jp:"抱える", romaji:"kakaeru", kana:"かかえる"},{jp:"規律", romaji:"kiritsu", kana:"きりつ"},
        {jp:"勢い", romaji:"ikioi", kana:"いきおい"},{jp:"賢い", romaji:"kashikoi", kana:"かしこい"},
        {jp:"敬語", romaji:"keigo", kana:"けいご"},{jp:"大臣", romaji:"daijin", kana:"だいじん"},
        {jp:"服装", romaji:"fukusou", kana:"ふくそう"},{jp:"似合う", romaji:"niau", kana:"にあう"},
        {jp:"増減", romaji:"zougen", kana:"ぞうげん"},{jp:"長官", romaji:"choukan", kana:"ちょうかん"},
        {jp:"技", romaji:"waza", kana:"わざ"},{jp:"腕", romaji:"ude", kana:"うで"},
        {jp:"無意識", romaji:"muishiki", kana:"むいしき"},{jp:"入学金", romaji:"nyuugakukin", kana:"にゅうがくきん"},
        {jp:"残業", romaji:"zangyou", kana:"ざんぎょう"},{jp:"人類", romaji:"jinrui", kana:"じんるい"},
        {jp:"プライド", romaji:"puraido", kana:"ぷらいど"},{jp:"許可証", romaji:"kyokashou", kana:"きょかしょう"},
        {jp:"賞味期限", romaji:"shoumikigen", kana:"しょうみきげん"},{jp:"具体的", romaji:"gutaiteki", kana:"ぐたいてき"},
        {jp:"説明", romaji:"setsumei", kana:"せつめい"},{jp:"打ち合わせ", romaji:"uchiawase", kana:"うちあわせ"},
        {jp:"検索", romaji:"kensaku", kana:"けんさく"},{jp:"支給", romaji:"shikyuu", kana:"しきゅう"},
        {jp:"消去", romaji:"shoukyo", kana:"しょうきょ"},{jp:"組む", romaji:"kumu", kana:"くむ"},
        {jp:"要領", romaji:"youryou", kana:"ようりょう"},{jp:"出世", romaji:"shusse", kana:"しゅっせ"}
    ];

    // 预留其他级别词库（待添加）
    const VOCAB_LIBRARY = {
        N5: [],
        N4: [],
        N3: [],
        N2: N2_VOCAB,
        N1: []
    };

    // 游戏状态
    let currentLevel = "N2";
    let masterWordList = [...N2_VOCAB];
    
    let currentRoundQuestions = [];
    let currentIndex = 0;
    let currentWordObj = null;
    let gameActive = false;
    let isPaused = false;
    let currentMode = "normal";
    let currentRoundNum = 1;
    
    let correctInRound = 0;
    let wrongInRound = 0;
    let roundScore = 0;
    
    let wrongBank = [];
    let favoriteBank = [];
    
    let romajiVisible = false;
    let kanaVisible = false;
    
    // DOM 元素
    const jpWordEl = document.getElementById("jpWord");
    const romajiHintEl = document.getElementById("romajiHint");
    const kanaHintEl = document.getElementById("kanaHint");
    const userInputEl = document.getElementById("userInput");
    const matchStatus = document.getElementById("matchStatus");
    const errorDetail = document.getElementById("errorDetail");
    const prefixHint = document.getElementById("prefixHint");
    const correctCountEl = document.getElementById("correctCount");
    const wrongCountEl = document.getElementById("wrongCount");
    const progressCountEl = document.getElementById("progressCount");
    const totalQSpan = document.getElementById("totalQ");
    const scoreValueEl = document.getElementById("scoreValue");
    const roundNumEl = document.getElementById("roundNum");
    const modeTextSpan = document.getElementById("modeText");
    const roundInfoSpan = document.getElementById("roundInfo");
    const startPauseBtn = document.getElementById("startPauseBtn");
    const resetGameBtn = document.getElementById("resetGameBtn");
    const submitBtn = document.getElementById("submitBtn");
    const romajiTeddyBtn = document.getElementById("romajiTeddyBtn");
    const kanaTeddyBtn = document.getElementById("kanaTeddyBtn");
    const addToFavoriteBtn = document.getElementById("addToFavoriteBtn");
    const clearFavoritesBtn = document.getElementById("clearFavoritesBtn");
    const reviewWrongBankBtn = document.getElementById("reviewWrongBankBtn");
    const wrongListDiv = document.getElementById("wrongList");
    const favoriteListDiv = document.getElementById("favoriteList");
    const testedCountSpan = document.getElementById("testedCount");
    const remainingCountSpan = document.getElementById("remainingCount");
    const progressFill = document.getElementById("progressFill");
    
    // 更新词库进度显示
    function updateLibraryProgress() {
        const total = masterWordList.length;
        const testedSet = new Set();
        // 从localStorage获取已测试的单词记录
        const testedWords = localStorage.getItem("japanese_testedWords_" + currentLevel);
        if(testedWords) {
            const testedArr = JSON.parse(testedWords);
            testedArr.forEach(w => testedSet.add(w));
        }
        const tested = testedSet.size;
        testedCountSpan.innerText = `📖 已测试: ${tested}词`;
        remainingCountSpan.innerText = `📚 剩余: ${total - tested}词`;
        const percent = total > 0 ? (tested / total * 100) : 0;
        progressFill.style.width = `${percent}%`;
    }
    
    // 记录已测试单词
    function markWordAsTested(word) {
        const key = "japanese_testedWords_" + currentLevel;
        let tested = localStorage.getItem(key);
        let testedArr = tested ? JSON.parse(tested) : [];
        if(!testedArr.includes(word.jp)) {
            testedArr.push(word.jp);
            localStorage.setItem(key, JSON.stringify(testedArr));
            updateLibraryProgress();
        }
    }
    
    function updateHintVisibility() {
        if (romajiVisible) romajiHintEl.classList.remove("blurred");
        else romajiHintEl.classList.add("blurred");
        if (kanaVisible) kanaHintEl.classList.remove("blurred");
        else kanaHintEl.classList.add("blurred");
    }
    
    function updateModeDisplay() {
        if (!gameActive || isPaused) {
            if(isPaused && gameActive) {
                modeTextSpan.innerText = "⏸ 暂停中";
                modeTextSpan.className = "mode-normal";
            } else {
                modeTextSpan.innerText = "未开始";
                modeTextSpan.className = "mode-normal";
            }
            roundInfoSpan.innerText = "";
            return;
        }
        if (currentMode === "normal") {
            modeTextSpan.innerText = "📖 新词学习";
            modeTextSpan.className = "mode-normal";
            roundInfoSpan.innerText = "";
        } else if (currentMode === "review") {
            modeTextSpan.innerText = `🔄 错词复习 (第${currentRoundNum}/3轮)`;
            modeTextSpan.className = "mode-review";
            roundInfoSpan.innerText = `本轮剩余: ${currentRoundQuestions.length}个错词`;
        } else if (currentMode === "wrongbank") {
            modeTextSpan.innerText = "📕 错题本复习";
            modeTextSpan.className = "mode-wrongbank";
            roundInfoSpan.innerText = `错题本剩余: ${currentRoundQuestions.length}个`;
        }
        roundNumEl.innerText = currentMode === "review" ? currentRoundNum : 0;
    }
    
    function updatePrefixHint() {
        if (!gameActive || isPaused || !currentWordObj) {
            prefixHint.innerHTML = "💡 输入罗马音后，这里会显示前缀匹配情况";
            return;
        }
        const input = userInputEl.value.toLowerCase();
        const target = currentWordObj.romaji.toLowerCase();
        
        if (input.length === 0) {
            prefixHint.innerHTML = "💡 输入罗马音后，这里会显示前缀匹配情况";
            prefixHint.className = "prefix-hint";
        } else if (target === input) {
            prefixHint.innerHTML = `✅ 完美匹配！可以提交了！`;
            prefixHint.className = "prefix-hint correct";
        } else if (target.startsWith(input)) {
            prefixHint.innerHTML = `🎯 前缀匹配正确 (${input})，继续输入...`;
            prefixHint.className = "prefix-hint correct";
        } else {
            prefixHint.innerHTML = `❌ 前缀不匹配 (${input})，正确罗马音以 "${target.substring(0, Math.min(5, target.length))}..." 开头`;
            prefixHint.className = "prefix-hint wrong";
        }
    }
    
    function loadStorage() {
        const savedWrong = localStorage.getItem("japanese_n2_wrongBank");
        const savedFav = localStorage.getItem("japanese_n2_favoriteBank");
        if(savedWrong) wrongBank = JSON.parse(savedWrong);
        if(savedFav) favoriteBank = JSON.parse(savedFav);
        updateBanksUI();
        updateLibraryProgress();
    }
    
    function saveWrongBank() {
        localStorage.setItem("japanese_n2_wrongBank", JSON.stringify(wrongBank));
        updateBanksUI();
    }
    
    function saveFavBank() {
        localStorage.setItem("japanese_n2_favoriteBank", JSON.stringify(favoriteBank));
        updateBanksUI();
    }
    
    function updateBanksUI() {
        wrongListDiv.innerHTML = wrongBank.length ? wrongBank.map((w,idx) => 
            `<div class="bank-item">${w.jp} (${w.romaji}) <button class="remove-btn" data-type="wrong" data-idx="${idx}">❌</button></div>`
        ).join('') : '<div style="color:#666;">暂无错题</div>';
        
        favoriteListDiv.innerHTML = favoriteBank.length ? favoriteBank.map((f,idx) => 
            `<div class="bank-item">${f.jp} (${f.romaji}) <button class="remove-btn" data-type="fav" data-idx="${idx}">❌</button></div>`
        ).join('') : '<div style="color:#666;">暂无收藏</div>';
        
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const type = btn.dataset.type;
                const idx = parseInt(btn.dataset.idx);
                if(type === 'wrong') {
                    wrongBank.splice(idx,1);
                    saveWrongBank();
                } else if(type === 'fav') {
                    favoriteBank.splice(idx,1);
                    saveFavBank();
                }
            });
        });
    }
    
    function addToWrongBank(word) {
        if(!wrongBank.find(w => w.jp === word.jp)) {
            wrongBank.push({jp: word.jp, romaji: word.romaji, kana: word.kana});
            saveWrongBank();
        }
    }
    
    function addToFavorite() {
        if(!gameActive || isPaused || !currentWordObj) {
            matchStatus.innerText = "⚠️ 请先开始游戏！";
            return;
        }
        if(!favoriteBank.find(f => f.jp === currentWordObj.jp)) {
            favoriteBank.push({jp: currentWordObj.jp, romaji: currentWordObj.romaji, kana: currentWordObj.kana});
            saveFavBank();
            matchStatus.innerText = `⭐ 已收藏 ${currentWordObj.jp}`;
            setTimeout(() => updateGameStatusMsg(), 800);
        } else {
            matchStatus.innerText = `⚠️ 已在收藏本中`;
        }
    }
    
    function updateGameStatusMsg() {
        if(gameActive && !isPaused) matchStatus.innerText = "🎮 游戏中! 输入罗马音后按回车或提交";
    }
    
    function startNewGame() {
        let total = parseInt(document.getElementById("questionCount").value) || 10;
        let wordPool = [...masterWordList];
        if(wordPool.length === 0) return;
        
        let shuffled = [...wordPool];
        for(let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentRoundQuestions = shuffled.slice(0, Math.min(total, shuffled.length));
        currentRoundQuestions = currentRoundQuestions.map(q => ({...q, wrongCount: 0}));
        
        currentIndex = 0;
        correctInRound = 0;
        wrongInRound = 0;
        roundScore = 0;
        gameActive = true;
        isPaused = false;
        currentMode = "normal";
        currentRoundNum = 1;
        
        updateStatsUI();
        totalQSpan.innerText = currentRoundQuestions.length;
        loadCurrentWord();
        userInputEl.disabled = false;
        userInputEl.value = "";
        userInputEl.focus();
        matchStatus.innerText = "🎮 游戏中! 输入罗马音后按回车或提交";
        errorDetail.innerText = "";
        prefixHint.innerHTML = "💡 输入罗马音后，这里会显示前缀匹配情况";
        prefixHint.className = "prefix-hint";
        updateModeDisplay();
        startPauseBtn.innerHTML = "⏸ 暂停";
    }
    
    function pauseGame() {
        if(!gameActive) return;
        isPaused = true;
        userInputEl.disabled = true;
        matchStatus.innerText = "⏸ 游戏已暂停，点击「继续」恢复";
        startPauseBtn.innerHTML = "▶ 继续";
        updateModeDisplay();
    }
    
    function resumeGame() {
        if(!gameActive) return;
        isPaused = false;
        userInputEl.disabled = false;
        userInputEl.focus();
        matchStatus.innerText = "🎮 游戏中! 输入罗马音后按回车或提交";
        startPauseBtn.innerHTML = "⏸ 暂停";
        updateModeDisplay();
        updatePrefixHint();
    }
    
    function toggleStartPause() {
        if(!gameActive) {
            startNewGame();
        } else if(isPaused) {
            resumeGame();
        } else {
            pauseGame();
        }
    }
    
    function resetGame() {
        if(currentRoundQuestions.length > 0) {
            startNewGame();
        } else {
            startNewGame();
        }
        matchStatus.innerText = "🔄 已重置，开始新的一轮！";
    }
    
    function startReviewRound() {
        let wrongWords = currentRoundQuestions.filter(q => q.wrongCount > 0);
        if(wrongWords.length === 0) {
            matchStatus.innerText = "🎉 本轮没有错词！太棒了！";
            return;
        }
        
        currentRoundQuestions = wrongWords.map(w => ({...w, wrongCount: 0}));
        currentIndex = 0;
        correctInRound = 0;
        wrongInRound = 0;
        roundScore = 0;
        gameActive = true;
        isPaused = false;
        currentMode = "review";
        currentRoundNum++;
        
        totalQSpan.innerText = currentRoundQuestions.length;
        updateStatsUI();
        loadCurrentWord();
        userInputEl.disabled = false;
        userInputEl.value = "";
        userInputEl.focus();
        matchStatus.innerText = `📚 第${currentRoundNum}轮复习！全部答对即可通关`;
        errorDetail.innerText = "";
        updateModeDisplay();
        startPauseBtn.innerHTML = "⏸ 暂停";
    }
    
    function startWrongBankReview() {
        if(wrongBank.length === 0) {
            matchStatus.innerText = "📕 错题本为空！";
            return;
        }
        
        currentRoundQuestions = wrongBank.map(w => ({...w, wrongCount: 0}));
        currentIndex = 0;
        correctInRound = 0;
        wrongInRound = 0;
        roundScore = 0;
        gameActive = true;
        isPaused = false;
        currentMode = "wrongbank";
        
        totalQSpan.innerText = currentRoundQuestions.length;
        updateStatsUI();
        loadCurrentWord();
        userInputEl.disabled = false;
        userInputEl.value = "";
        userInputEl.focus();
        matchStatus.innerText = "📕 错题本复习模式！";
        errorDetail.innerText = "";
        updateModeDisplay();
        startPauseBtn.innerHTML = "⏸ 暂停";
    }
    
    function loadCurrentWord() {
        if(!gameActive || currentIndex >= currentRoundQuestions.length) {
            endRound();
            return;
        }
        currentWordObj = currentRoundQuestions[currentIndex];
        jpWordEl.innerText = currentWordObj.jp;
        romajiHintEl.innerText = currentWordObj.romaji;
        kanaHintEl.innerText = currentWordObj.kana || currentWordObj.romaji;
        userInputEl.value = "";
        updatePrefixHint();
        if(gameActive && !isPaused) {
            matchStatus.innerText = "🎮 游戏中! 输入罗马音后按回车或提交";
        }
        errorDetail.innerText = "";
    }
    
    function submitAnswer() {
        if (!gameActive || isPaused || !currentWordObj) {
            matchStatus.innerText = "⚠️ 请先开始游戏！";
            return;
        }
        
        const userAnswer = userInputEl.value.trim().toLowerCase();
        const correctAnswer = currentWordObj.romaji.toLowerCase();
        
        if (userAnswer === correctAnswer) {
            correctInRound++;
            roundScore += 10;
            markWordAsTested(currentWordObj);
            
            matchStatus.innerText = `✅ 正确！ +10分`;
            errorDetail.innerText = "";
            userInputEl.value = "";
            
            currentIndex++;
            updateStatsUI();
            
            if (currentIndex < currentRoundQuestions.length) {
                loadCurrentWord();
            } else {
                endRound();
            }
        } else {
            let currentQ = currentRoundQuestions[currentIndex];
            currentQ.wrongCount = (currentQ.wrongCount || 0) + 1;
            wrongInRound++;
            updateStatsUI();
            
            matchStatus.innerText = `❌ 错误！正确答案是: ${correctAnswer}`;
            errorDetail.innerText = `🔁 请重新输入，本题还有机会`;
            userInputEl.focus();
        }
        updatePrefixHint();
    }
    
    function updateStatsUI() {
        correctCountEl.innerText = correctInRound;
        wrongCountEl.innerText = wrongInRound;
        progressCountEl.innerHTML = `${currentIndex}/${currentRoundQuestions.length}`;
        scoreValueEl.innerText = roundScore;
    }
    
    function endRound() {
        let wrongWords = currentRoundQuestions.filter(q => q.wrongCount > 0);
        
        if (wrongWords.length === 0) {
            if (currentMode === "review") {
                gameActive = false;
                isPaused = false;
                matchStatus.innerText = `🎉 恭喜！第${currentRoundNum}轮复习全部正确！🎉`;
                errorDetail.innerText = `本轮正确率: 100%`;
                userInputEl.disabled = true;
                updateModeDisplay();
                startPauseBtn.innerHTML = "▶ 开始游戏";
                
                if (currentMode === "wrongbank") {
                    let currentJps = currentRoundQuestions.map(q => q.jp);
                    wrongBank = wrongBank.filter(w => !currentJps.includes(w.jp));
                    saveWrongBank();
                    matchStatus.innerText = "🎉 错题本复习完成！已从错题本中移除！";
                }
            } else if (currentMode === "normal") {
                gameActive = false;
                isPaused = false;
                matchStatus.innerText = `🎉 恭喜！本轮全部正确！🎉`;
                errorDetail.innerText = `得分: ${roundScore} | 正确率: 100%`;
                userInputEl.disabled = true;
                updateModeDisplay();
                startPauseBtn.innerHTML = "▶ 开始游戏";
            } else if (currentMode === "wrongbank") {
                gameActive = false;
                isPaused = false;
                matchStatus.innerText = `🎉 错题本复习完成！`;
                errorDetail.innerText = `全部正确！`;
                userInputEl.disabled = true;
                updateModeDisplay();
                startPauseBtn.innerHTML = "▶ 开始游戏";
                let currentJps = currentRoundQuestions.map(q => q.jp);
                wrongBank = wrongBank.filter(w => !currentJps.includes(w.jp));
                saveWrongBank();
            }
        } else {
            if (currentMode === "normal") {
                matchStatus.innerText = `📚 本轮有${wrongWords.length}个错词，进入第1轮复习...`;
                startReviewRound();
            } else if (currentMode === "review") {
                if (currentRoundNum < 3) {
                    matchStatus.innerText = `📚 第${currentRoundNum}轮复习有${wrongWords.length}个错词，进入第${currentRoundNum+1}轮复习...`;
                    startReviewRound();
                } else {
                    wrongWords.forEach(w => addToWrongBank(w));
                    gameActive = false;
                    isPaused = false;
                    matchStatus.innerText = `📕 三轮复习后仍有${wrongWords.length}个词未掌握，已放入错题本`;
                    errorDetail.innerText = `可以在下方错题本中继续复习`;
                    userInputEl.disabled = true;
                    updateModeDisplay();
                    startPauseBtn.innerHTML = "▶ 开始游戏";
                }
            } else if (currentMode === "wrongbank") {
                gameActive = false;
                isPaused = false;
                matchStatus.innerText = `📕 错题本复习：${wrongWords.length}个词仍需加强，已保留在错题本`;
                errorDetail.innerText = `可以继续从错题本复习`;
                userInputEl.disabled = true;
                updateModeDisplay();
                startPauseBtn.innerHTML = "▶ 开始游戏";
            }
        }
    }
    
    // 切换词库
    function switchLevel(level) {
        currentLevel = level;
        const newWordList = VOCAB_LIBRARY[level] || [];
        if(newWordList.length === 0) {
            matchStatus.innerText = `⚠️ ${level}词库暂未添加，请等待后续更新`;
            masterWordList = [];
            userInputEl.disabled = true;
        } else {
            masterWordList = [...newWordList];
            matchStatus.innerText = `✅ 已切换到${level}词库，共${masterWordList.length}个单词`;
        }
        updateLibraryProgress();
        // 更新按钮显示
        document.querySelectorAll('.level-dropdown-content button').forEach(btn => {
            if(btn.dataset.level === level) {
                btn.classList.add('active-level');
            } else {
                btn.classList.remove('active-level');
            }
        });
        document.getElementById("levelMainBtn").innerHTML = `📖 ${level}词库 ▼`;
    }
    
    // 事件绑定
    userInputEl.addEventListener("input", updatePrefixHint);
    
    userInputEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && gameActive && !isPaused) {
            e.preventDefault();
            submitAnswer();
        }
    });
    
    submitBtn.addEventListener("click", () => {
        if (gameActive && !isPaused) submitAnswer();
    });
    
    startPauseBtn.addEventListener("click", toggleStartPause);
    resetGameBtn.addEventListener("click", resetGame);
    
    romajiTeddyBtn.addEventListener("click", () => {
        romajiVisible = !romajiVisible;
        updateHintVisibility();
    });
    
    kanaTeddyBtn.addEventListener("click", () => {
        kanaVisible = !kanaVisible;
        updateHintVisibility();
    });
    
    addToFavoriteBtn.addEventListener("click", addToFavorite);
    clearFavoritesBtn.addEventListener("click", () => { favoriteBank = []; saveFavBank(); matchStatus.innerText = "⭐ 收藏本已清空"; });
    reviewWrongBankBtn.addEventListener("click", startWrongBankReview);
    
    // 词库切换
    document.querySelectorAll('.level-dropdown-content button').forEach(btn => {
        btn.addEventListener("click", () => {
            const level = btn.dataset.level;
            switchLevel(level);
        });
    });
    
    // 初始化
    updateHintVisibility();
    loadStorage();
    userInputEl.disabled = true;
</script>
</body>
</html>
